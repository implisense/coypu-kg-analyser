events:
  - id: military_attack_iran
    type: geopolitical
    criticality: high
    trigger:
      target: iran_oil_fields
    impacts:
      iran_oil_fields: -40%
      kharg_island: -50%
      strait_of_hormuz: -100%
    timeline:
      at: 1d
    name: Militärischer Erstangriff auf iranische Öl- und Gasinfrastruktur
  - id: strait_of_hormuz_blockade
    type: geopolitical
    criticality: high
    trigger:
      target: strait_of_hormuz
    causes:
      - military_attack_iran
    impacts:
      global_oil_market: +80%
      eu_refineries: -30%
      german_chemical_industry: -25%
    timeline:
      at: 1d
    name: Iran sperrt Straße von Hormuz — 21% des globalen Öltransits blockiert
  - id: international_sanctions
    type: regulatory
    criticality: high
    trigger:
      target: nioc
    causes:
      - military_attack_iran
    impacts:
      nioc: -60%
      iran_oil_fields: -30%
    timeline:
      at: 3d
    name: Westliche Sanktionen gegen NIOC und iranische Ölexporte in Kraft
  - id: attacks_on_tankers
    type: geopolitical
    criticality: medium
    trigger:
      target: persian_gulf_region
    causes:
      - military_attack_iran
    impacts:
      global_oil_market: +20%
    timeline:
      at: 2d
    name: Iranische Marinekräfte und Drohnen greifen Tanker im Persischen Golf an
  - id: logistics_reroute_cape_good_hope
    type: market_shock
    criticality: medium
    trigger:
      target: cape_good_hope_route
    causes:
      - strait_of_hormuz_blockade
    impacts:
      german_chemical_industry: -15%
    timeline:
      at: 2w
    name: Frachter weichen auf Kap-der-Guten-Hoffnung-Route aus (+14 Tage Lieferzeit)
  - id: military_strike_iran
    type: geopolitical
    criticality: critical
    name: Militärischer Angriff auf Iran
    timeline:
      at: 1d
    impacts:
      iran_oil_fields: -80%
      kharg_island: -90%
    trigger:
      target: iran_oil_fields
  - id: international_sanctions_iran
    type: regulatory
    criticality: high
    name: Internationale Sanktionen gegen Iran
    timeline:
      at: 2d
    impacts:
      nioc: -100%
      iran_copper_mines: -80%
    trigger:
      target: iran_oil_fields
  - id: hormuz_closure
