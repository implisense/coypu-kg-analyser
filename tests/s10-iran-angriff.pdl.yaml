cascades:
  - id: energy_cascade
    origin: military_strike_iran
    probability: 0.9
    name: Energie-Kaskade
    timeline:
      - at: 1d
        event: military_strike_iran
        affects:
          - iran_oil_fields
          - kharg_island
      - at: 3d
        event: hormuz_closure
        affects:
          - strait_of_hormuz
      - at: 10d
        event: global_oil_price_spike
        affects:
          - global_oil_market
          - eu_energy_market
      - at: 21d
        event: eu_energy_price_shock
        affects:
          - eu_refineries
          - german_chemical_industry
      - at: 60d
