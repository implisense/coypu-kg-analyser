pdl_version: "1.1"
scenario:
  id: iran_attack_scenario
  title: Kombinierter militärischer Angriff auf den Iran und internationale Sanktionen
  description: Kombinierter militärischer Angriff auf den Iran und internationale Sanktionen führt zur Sperrung der Straße von Hormuz (21% globaler Öltransit), Ölpreisschock (+80%), Störung iranischer Kupfer- und Petrochemikalienexporte. Deutschland und EU sind über direkte Importabhängigkeiten, indirekte Energiepreiswirkungen und Logistikunterbrechungen betroffen. Kaskadenwirkungen auf Chemie- und Automobilindustrie über 90-180 Tage.
  name: Militärischer Angriff und Sanktionen gegen Iran
  sector: energy
  criticality: high
entities:
  - id: iran_oil_fields
    type: infrastructure
    name: Iranische Ölfelder
    sector: energy
    vulnerability: 0.8
    stages:
      - nioc
    dependencies:
